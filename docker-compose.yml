version: "3.8"

x-db-env: &db-env
  DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/kapow

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - KAPOW_DOMAIN=${KAPOW_DOMAIN:-localhost}
    depends_on:
      - actions
      - board
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kapow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: unless-stopped

  planner:
    build:
      context: ./planner
      dockerfile: ../Dockerfile.agent
    env_file: .env
    environment:
      - PORT=3001
    expose:
      - "3001"
    restart: unless-stopped

  builder:
    build:
      context: ./builder
      dockerfile: ../Dockerfile.agent
    env_file: .env
    environment:
      - PORT=3002
      - BUS_URL=http://actions:3010
    expose:
      - "3002"
    restart: unless-stopped

  qa:
    build:
      context: ./qa
      dockerfile: ../Dockerfile.agent
    env_file: .env
    environment:
      - PORT=3003
      - BUS_URL=http://actions:3010
    expose:
      - "3003"
    restart: unless-stopped

  gate:
    build:
      context: ./gate
      dockerfile: ../Dockerfile.agent
    env_file: .env
    environment:
      - PORT=3004
    expose:
      - "3004"
    restart: unless-stopped

  technician:
    build:
      context: ./technician
      dockerfile: ../Dockerfile.agent
    env_file: .env
    environment:
      <<: *db-env
      PORT: "3006"
    expose:
      - "3006"
    depends_on:
      - postgres
    restart: unless-stopped

  comms:
    build:
      context: ./comms
      dockerfile: ../Dockerfile.agent
    env_file: .env
    environment:
      <<: *db-env
      PORT: "3008"
      ACTIONS_URL: http://actions:3000
      PLANNER_URL: http://planner:3001
    expose:
      - "3008"
    depends_on:
      - postgres
      - actions
      - planner
    restart: unless-stopped

  security:
    build:
      context: ./security
      dockerfile: ../Dockerfile.agent
    env_file: .env
    environment:
      <<: *db-env
      PORT: "3007"
      BUS_URL: http://actions:3010
      ACTIONS_URL: http://actions:3000
      PLANNER_URL: http://planner:3001
      BUILDER_URL: http://builder:3002
      QA_URL: http://qa:3003
      GATE_URL: http://gate:3004
      BOARD_URL: http://board:3005
      TECHNICIAN_URL: http://technician:3006
    expose:
      - "3007"
    depends_on:
      - postgres
      - actions
      - planner
      - builder
      - qa
      - gate
      - technician
    restart: unless-stopped

  actions:
    build:
      context: ./actions
      dockerfile: ../Dockerfile.agent
    env_file: .env
    environment:
      <<: *db-env
      PORT: "3000"
      PLANNER_URL: http://planner:3001
      BUILDER_URL: http://builder:3002
      QA_URL: http://qa:3003
      GATE_URL: http://gate:3004
      BOARD_URL: http://board:3005
      TECHNICIAN_URL: http://technician:3006
      SECURITY_URL: http://security:3007
    expose:
      - "3000"
      - "3010"
    depends_on:
      - postgres
      - planner
      - builder
      - qa
      - gate
      - technician
    restart: unless-stopped

  board:
    build:
      context: ./board
      dockerfile: ../Dockerfile.board
    env_file: .env
    environment:
      <<: *db-env
      PORT: "3005"
      KAPOW_ACTIONS_URL: http://actions:3000
    expose:
      - "3005"
    depends_on:
      - postgres
      - actions
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
