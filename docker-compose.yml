version: "3.8"

x-db-env: &db-env
  DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/kapow

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kapow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: unless-stopped

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.agent
      args: { SERVICE: pipeline }
    env_file: .env
    environment:
      <<: *db-env
      PORT: "3000"
      TECHNICIAN_URL: http://technician:3006
      BOARD_URL: http://board:3005
    expose:
      - "3000"
    depends_on:
      - postgres
      - technician
    restart: unless-stopped

  technician:
    build:
      context: .
      dockerfile: Dockerfile.agent
      args: { SERVICE: technician }
    env_file: .env
    environment:
      <<: *db-env
      PORT: "3006"
    expose:
      - "3006"
    depends_on:
      - postgres
    restart: unless-stopped

  board:
    build:
      context: .
      dockerfile: Dockerfile.board
    env_file: .env
    environment:
      <<: *db-env
      PORT: "3005"
      KAPOW_ACTIONS_URL: http://pipeline:3000
      PLANNER_URL: http://pipeline:3000
    expose:
      - "3005"
    depends_on:
      - postgres
      - pipeline
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - KAPOW_DOMAIN=${KAPOW_DOMAIN:-localhost}
    depends_on:
      - pipeline
      - board
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
