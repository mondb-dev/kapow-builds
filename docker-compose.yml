version: "3.8"

x-db-env: &db-env
  DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/kapow

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kapow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # One-shot: push schema + seed on first boot
  db-init:
    build:
      context: .
      dockerfile: Dockerfile.agent
      args: { SERVICE: db }
    environment:
      <<: *db-env
    command: sh -c "npx prisma db push --skip-generate && npx tsx src/seed.ts"
    working_dir: /app/db
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.agent
      args: { SERVICE: pipeline }
    env_file: .env
    environment:
      <<: *db-env
      PORT: "3000"
      TECHNICIAN_URL: http://technician:3006
    expose:
      - "3000"
    depends_on:
      db-init:
        condition: service_completed_successfully
      technician:
        condition: service_started
    restart: unless-stopped

  technician:
    build:
      context: .
      dockerfile: Dockerfile.agent
      args: { SERVICE: technician }
    env_file: .env
    environment:
      <<: *db-env
      PORT: "3006"
    expose:
      - "3006"
    depends_on:
      db-init:
        condition: service_completed_successfully
    restart: unless-stopped

  board:
    build:
      context: .
      dockerfile: Dockerfile.board
    env_file: .env
    environment:
      <<: *db-env
      PORT: "3005"
      KAPOW_ACTIONS_URL: http://pipeline:3000
    expose:
      - "3005"
    depends_on:
      db-init:
        condition: service_completed_successfully
      pipeline:
        condition: service_started
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - KAPOW_DOMAIN=${KAPOW_DOMAIN:-localhost}
    depends_on:
      - board
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
